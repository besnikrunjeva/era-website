<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rreth Nesh – ERA Print Pack</title>
  <meta name="description" content="Mëso më shumë rreth ERA Print Pack – historinë tonë, misionin, vlerat dhe ekipin që qëndron pas çdo produkti cilësor." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=62" />
  <link rel="icon" type="image/svg+xml" href="assets/era-logo.svg" />
</head>
<body>

<!-- ── NAVBAR ─────────────────────────────────────────────── -->
<div id="site-nav"></div>


<!-- ── PAGE HERO ──────────────────────────────────────────── -->
<section class="page-hero">
  <div class="container">
    <span class="badge hero-anim-badge" style="--delay:0ms" data-i18n="about.badge"></span>
    <h1 class="hero-anim-title" style="--delay:180ms" data-i18n="about.title"></h1>
    <p class="hero-anim-text" style="--delay:360ms" data-i18n="about.sub"></p>
  </div>
</section>


<!-- ── STORY SECTION ──────────────────────────────────────── -->
<section class="section">
  <div class="container">
    <div class="about-split">
      <div class="about-img fade-in">
        <img src="assets/print-team.webp" alt="ERA Print Pack Team" loading="lazy" />
      </div>
      <div class="about-content fade-in">
        <span class="badge" data-i18n="about.badge"></span>
        <h2 data-i18n="about.title"></h2>
        <p data-i18n="about.p1"></p>
        <p data-i18n="about.p2"></p>
        <div class="about-values">
          <div class="value-item"><span class="value-dot"></span><span data-i18n="val1"></span></div>
          <div class="value-item"><span class="value-dot"></span><span data-i18n="val2"></span></div>
          <div class="value-item"><span class="value-dot"></span><span data-i18n="val3"></span></div>
          <div class="value-item"><span class="value-dot"></span><span data-i18n="val4"></span></div>
          <div class="value-item"><span class="value-dot"></span><span data-i18n="val5"></span></div>
          <div class="value-item"><span class="value-dot"></span><span data-i18n="val6"></span></div>
        </div>
      </div>
    </div>
  </div>
</section>


<!-- ── STATS ──────────────────────────────────────────────── -->
<section class="section-sm" style="background:var(--green-light);">
  <div class="container">
    <div class="hero-stats" style="max-width:100%;background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);">
      <div class="hero-stat" style="background:var(--white);">
        <div class="hero-stat-number" style="color:var(--green);" data-i18n="hero.stat1.n"></div>
        <div class="hero-stat-label" style="color:var(--text-soft);" data-i18n="hero.stat1.l"></div>
      </div>
      <div class="hero-stat" style="background:var(--white);">
        <div class="hero-stat-number" style="color:var(--green);" data-i18n="hero.stat2.n"></div>
        <div class="hero-stat-label" style="color:var(--text-soft);" data-i18n="hero.stat2.l"></div>
      </div>
      <div class="hero-stat" style="background:var(--white);">
        <div class="hero-stat-number" style="color:var(--green);" data-i18n="hero.stat3.n"></div>
        <div class="hero-stat-label" style="color:var(--text-soft);" data-i18n="hero.stat3.l"></div>
      </div>
      <div class="hero-stat" style="background:var(--white);">
        <div class="hero-stat-number" style="color:var(--green);" data-i18n="hero.stat4.n"></div>
        <div class="hero-stat-label" style="color:var(--text-soft);" data-i18n="hero.stat4.l"></div>
      </div>
    </div>
  </div>
</section>


<!-- ── MISSION ────────────────────────────────────────────── -->
<section class="section why-us">
  <div class="container">
    <div class="about-split" style="gap:56px;">
      <div class="fade-in">
        <span class="badge" style="background:rgba(255,255,255,.15);color:rgba(255,255,255,.9);" data-i18n="mission.badge"></span>
        <h2 style="color:var(--white);margin:12px 0 20px;" data-i18n="mission.title"></h2>
        <p style="color:rgba(255,255,255,.78);font-size:1.05rem;line-height:1.8;" data-i18n="mission.text"></p>
        <div style="margin-top:32px;">
          <a href="contact.html" class="btn btn-outline btn-lg" data-i18n="cta.btn1"></a>
        </div>
      </div>
      <div class="fade-in">
        <div class="why-grid" style="grid-template-columns:1fr;gap:16px;">
          <div class="why-card">
            <div class="why-icon">🏭</div>
            <div>
              <h3 data-i18n="why1.t"></h3>
              <p data-i18n="why1.d"></p>
            </div>
          </div>
          <div class="why-card">
            <div class="why-icon">🌿</div>
            <div>
              <h3 data-i18n="why6.t"></h3>
              <p data-i18n="why6.d"></p>
            </div>
          </div>
          <div class="why-card">
            <div class="why-icon">🤝</div>
            <div>
              <h3 data-i18n="why5.t"></h3>
              <p data-i18n="why5.d"></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>


<!-- ── PRODUCTION ─────────────────────────────────────────── -->
<section class="section">
  <div class="container">
    <div class="section-header text-center fade-in">
      <span class="badge" data-i18n="prod.sec.badge"></span>
      <h2 data-i18n="prod.sec.title"></h2>
      <p data-i18n="prod.sec.sub"></p>
    </div>
    <div class="about-split fade-in">
      <div class="about-img">
        <img src="assets/offset-press.webp" alt="Offset Press" loading="lazy" />
      </div>
      <div class="about-img">
        <img src="assets/production-line.webp" alt="Production Line" loading="lazy" />
      </div>
    </div>
  </div>
</section>


<!-- ── TEAM ───────────────────────────────────────────────── -->
<section class="section" style="background:var(--gray-light);">
  <div class="container">
    <div class="section-header text-center fade-in">
      <span class="badge" data-i18n="team.badge"></span>
      <h2 data-i18n="team.title"></h2>
      <p data-i18n="team.sub"></p>
    </div>

    <div class="team-grid">
      <div class="team-card fade-in">
        <div class="team-photo">
          <div class="team-photo-placeholder">👨‍💼</div>
        </div>
        <div class="team-info">
          <h3>Besnik Krasniqi</h3>
          <p>Drejtor Ekzekutiv</p>
        </div>
      </div>
      <div class="team-card fade-in">
        <div class="team-photo">
          <div class="team-photo-placeholder">👩‍🎨</div>
        </div>
        <div class="team-info">
          <h3>Arta Berisha</h3>
          <p>Drejtoreshë Dizajni</p>
        </div>
      </div>
      <div class="team-card fade-in">
        <div class="team-photo">
          <div class="team-photo-placeholder">👨‍🔧</div>
        </div>
        <div class="team-info">
          <h3>Florim Gashi</h3>
          <p>Menaxher Prodhimi</p>
        </div>
      </div>
    </div>
  </div>
</section>


<!-- ── CTA BANNER ─────────────────────────────────────────── -->
<section class="cta-banner">
  <div class="container">
    <h2 data-i18n="cta.title"></h2>
    <p data-i18n="cta.sub"></p>
    <div class="cta-btns">
      <a href="contact.html" class="btn btn-outline btn-lg" data-i18n="cta.btn1"></a>
      <a href="tel:+38344113533" class="btn btn-lg" style="background:rgba(255,255,255,.15);color:#fff;border:2px solid rgba(255,255,255,.3);" data-i18n="cta.btn2"></a>
    </div>
  </div>
</section>


<!-- ── FOOTER ─────────────────────────────────────────────── -->
<div id="site-footer"></div>

<div id="site-whatsapp"></div>

<script src="js/main.js?v=13"></script>
</body>
</html>
